gitops:
  name: gitops-helm-application
  projectIdentifier: defaultproject
  orgIdentifier: default
  type: application
  application:
    metadata:
      namespace: default
      clusterName: gitops_cluster
      labels:
        harness.io/serviceRef: ""
        harness.io/envRef: ""
    spec:
      source:
        repoURL: https://github.com/Stan-BK/harness-test
        path: .
        targetRevision: main
      destination:
        server: https://kubernetes.default.svc
        namespace: default
  agentIdentifier: harnessagent
  clusterIdentifier: gitopscluster
  repoIdentifier: gitopsrepo